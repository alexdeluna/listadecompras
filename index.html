<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feira Fácil</title>

<link rel="stylesheet" href="visual.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2f6fed">

</head>
<body>

<div class="app">

<header class="topo">
<h1>🛒 Feira Fácil</h1>
<p>Controle sua feira e compare preços.</p>
</header>

<nav class="menu">

<button onclick="mostrarTela('lista')" class="aba ativa">Lista</button>
<button onclick="mostrarTela('feira')" class="aba">Feira</button>
<button onclick="mostrarTela('comparacao')" class="aba">Comparação</button>

</nav>

<!-- TELA LISTA -->

<section id="lista" class="tela ativa">

<div class="card">

<h2>Adicionar item</h2>

<input id="nomeItem" placeholder="Nome do item">

<input id="qtdItem" type="number" placeholder="Quantidade">

<button onclick="adicionarItem()" class="btn">Adicionar</button>

<button onclick="restaurarUltimaLista()" class="btn-sec">Restaurar última lista</button>

</div>

<ul id="listaCadastro"></ul>

</section>

<!-- TELA FEIRA -->

<section id="feira" class="tela">

<div class="card">

<h2>Durante a feira</h2>

<div class="resumo">

<div>Total itens: <strong id="totalItens">0</strong></div>

<div>Total compra: <strong id="valorTotal">R$ 0,00</strong></div>

</div>

<button onclick="salvarUltimaFeira()" class="btn">Salvar como última feira</button>

</div>

<ul id="listaFeira"></ul>

</section>

<!-- TELA COMPARAÇÃO -->

<section id="comparacao" class="tela">

<div class="card">

<h2>Comparação de preços</h2>

<div id="comparacaoLista"></div>

</div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
